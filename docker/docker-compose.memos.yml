# MemOS for AI Movie character memory (port 9005)
#
# MemOS requires Neo4j + Qdrant + MemOS API. Full setup:
#   1. git clone https://github.com/MemTensor/MemOS.git ../MemOS
#   2. cd ../MemOS && cp docker/.env.example .env  # configure OPENAI_API_KEY, etc.
#   3. cd docker && docker compose up -d
#
# MemOS exposes port 8000 by default. To use port 9005 in round-table:
#   - Either set MEMOS_BASE_URL=http://localhost:8000 in round-table .env
#   - Or change MemOS ports below and run this compose (requires MemOS at ../MemOS)
#
# This compose runs MemOS stack when MemOS is cloned at ../MemOS (sibling to round-table).
# Usage: docker compose -f docker/docker-compose.memos.yml up -d

name: round-table-memos

services:
  memos:
    build:
      context: ../MemOS
      dockerfile: docker/Dockerfile
    container_name: memos-api
    ports:
      - "9005:8000"
    env_file:
      - ../MemOS/.env
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      - PYTHONPATH=/app/src
      - HF_ENDPOINT=https://hf-mirror.com
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEO4J_URI=bolt://neo4j:7687
    networks:
      - memos_net

  neo4j:
    image: neo4j:5.26.4
    container_name: memos-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: wget -q --spider http://localhost:7474 || exit 1
      interval: 5s
      timeout: 10s
      retries: 10
    environment:
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_AUTH: "neo4j/12345678"
    volumes:
      - neo4j_data:/data
    networks:
      - memos_net

  qdrant:
    image: qdrant/qdrant:v1.15.3
    container_name: memos-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - memos_net

volumes:
  neo4j_data:
  qdrant_data:

networks:
  memos_net:
    driver: bridge
